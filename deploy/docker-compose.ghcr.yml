services:
  bibhelper:
    container_name: bibhelper
    image: ghcr.io/chainkhoo/bibhelper:latest
    pull_policy: always
    restart: unless-stopped
    env_file:
      - ./.env.runtime
    environment:
      JOB_RETENTION_DAYS: 0
      MAX_UPLOAD_FILES: 5
      MAX_UPLOAD_BYTES: 52428800
      MAX_CONCURRENT_JOBS: 1
      BIBHELPER_DATA_ROOT: /data/bibhelper
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ${BIBHELPER_HOST_DATA_ROOT:-/opt/bibhelper-data}:/data/bibhelper
